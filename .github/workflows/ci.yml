# CI del RouterOS Toolkit — 4 jobs (ver PLAN_FRONTEND.md § 8):
#   cli      → unittest stdlib (sin dependencias, como corre el CLI)
#   backend  → pytest del panel (FakeAPI, sin router)
#   frontend → tsc estricto + vite build + vitest
#   docker   → docker compose build (las 2 imágenes)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI (unittest stdlib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s tests -v

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: python -m pytest backend/tests -q

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build          # tsc -b estricto + vite build
      - run: npm run test

  docker:
    name: Docker (compose build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # config.env real nunca está en el repo; el build solo necesita
      # que el archivo exista (env_file se lee al levantar, no al armar)
      - run: cp config.env.example config.env
      - run: docker compose build
