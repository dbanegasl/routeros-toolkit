# nginx del servicio web: sirve la SPA y hace proxy de /api y /ws
# hacia el backend (servicio `api` de la red interna de compose).
#
# Corre como usuario no-root (imagen nginx-unprivileged): puerto 8080
# dentro del contenedor; compose lo publica en PANEL_PORT del host.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Hardening ────────────────────────────────────────────────────
    server_tokens off;
    # Los cuerpos legítimos son JSON pequeños (login, confirmaciones)
    client_max_body_size 64k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # 'unsafe-inline' solo en estilos: recharts pinta con style= inline.
    # ws:/wss: para /ws/* (algunos navegadores no los cubren con 'self').
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # SPA: cualquier ruta desconocida vuelve a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSockets (Fase 3): upgrade de conexión
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
